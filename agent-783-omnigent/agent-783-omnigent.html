<!DOCTYPE html>
<html lang="zh" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent 783 — Omnigent 元调度</title>
<style>
  :root {
    --bg: #1A1B26;
    --bg2: #16161E;
    --fg: #C0CAF5;
    --accent: #BB9AF7;
    --accent2: #7AA2F7;
    --accent3: #9ECE6A;
    --muted: #565F89;
    --border: #3B4261;
    --red: #F7768E;
    --yellow: #E0AF68;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--fg);
    font-family: 'Cascadia Code', 'JetBrains Mono', 'Fira Code', monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .scene {
    position: relative;
    width: 420px;
    height: 540px;
  }

  /* 中心枢纽 */
  .hub {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 96px;
    height: 96px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #C9A8FF, var(--accent));
    box-shadow:
      0 0 20px var(--accent),
      0 0 60px rgba(187,154,247,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 1px;
    text-align: center;
    line-height: 1.2;
    z-index: 10;
    animation: hub-pulse 3s ease-in-out infinite;
  }

  @keyframes hub-pulse {
    0%, 100% { box-shadow: 0 0 20px var(--accent), 0 0 60px rgba(187,154,247,0.4); }
    50% { box-shadow: 0 0 30px var(--accent), 0 0 80px rgba(187,154,247,0.6); }
  }

  /* 轨道环 */
  .orbit {
    position: absolute;
    top: 50%;
    left: 50%;
    border-radius: 50%;
    border: 1px dashed;
    transform: translate(-50%, -50%);
    opacity: 0.4;
  }

  .orbit-1 {
    width: 200px;
    height: 200px;
    border-color: var(--accent);
    animation: orbit-spin 12s linear infinite;
  }

  .orbit-2 {
    width: 290px;
    height: 290px;
    border-color: var(--accent2);
    animation: orbit-spin 20s linear infinite reverse;
    opacity: 0.25;
  }

  .orbit-3 {
    width: 380px;
    height: 380px;
    border-color: var(--muted);
    animation: orbit-spin 30s linear infinite;
    opacity: 0.15;
  }

  @keyframes orbit-spin {
    from { transform: translate(-50%, -50%) rotate(0deg); }
    to { transform: translate(-50%, -50%) rotate(360deg); }
  }

  /* 轨道节点 */
  .node {
    position: absolute;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: 700;
    color: #fff;
    z-index: 5;
  }

  .node-cc {
    top: calc(50% - 100px - 18px);
    left: calc(50% - 18px);
    background: radial-gradient(circle at 35% 35%, #89DDFF, #0EA5E9);
    box-shadow: 0 0 12px rgba(14,165,233,0.7);
  }

  .node-cx {
    top: calc(50% - 18px);
    right: calc(50% - 200px - 18px);
    background: radial-gradient(circle at 35% 35%, #7DCFFF, #0284C7);
    box-shadow: 0 0 12px rgba(2,132,199,0.7);
  }

  .node-cursor {
    bottom: calc(50% - 145px - 18px);
    left: calc(50% + 58px);
    background: radial-gradient(circle at 35% 35%, #6EE7B7, #059669);
    box-shadow: 0 0 12px rgba(5,150,105,0.7);
  }

  .node-pi {
    top: calc(50% + 58px);
    left: calc(50% - 145px - 18px);
    background: radial-gradient(circle at 35% 35%, #FCD34D, #D97706);
    box-shadow: 0 0 12px rgba(217,119,6,0.7);
  }

  /* 连接线 */
  .links {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 1;
  }

  .links svg { width: 100%; height: 100%; }

  /* 底部信息卡 */
  .info {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(22,22,30,0.9);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
  }

  .info-title {
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .info-name {
    font-size: 15px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 4px;
  }

  .info-desc {
    font-size: 10px;
    color: var(--muted);
    line-height: 1.5;
  }

  .tag-row {
    display: flex;
    gap: 6px;
    margin-top: 8px;
    flex-wrap: wrap;
  }

  .tag {
    font-size: 9px;
    padding: 2px 8px;
    border-radius: 10px;
    background: rgba(187,154,247,0.15);
    color: var(--accent);
    border: 1px solid rgba(187,154,247,0.3);
  }

  .tag.green {
    background: rgba(158,206,106,0.12);
    color: var(--accent3);
    border-color: rgba(158,206,106,0.25);
  }

  /* 左上角编号 */
  .badge {
    position: absolute;
    top: 12px;
    left: 12px;
    background: var(--accent);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 8px;
    letter-spacing: 1px;
  }

  /* 扫描动画 */
  .scan {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 380px;
    height: 380px;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    overflow: hidden;
    pointer-events: none;
    z-index: 2;
    opacity: 0;
    animation: scan-fade 6s ease-in-out infinite;
  }

  .scan::after {
    content: '';
    position: absolute;
    top: 0; left: 50%;
    width: 2px;
    height: 50%;
    background: linear-gradient(to bottom, transparent, var(--accent), transparent);
    transform-origin: top center;
    animation: scan-line 6s linear infinite;
  }

  @keyframes scan-line {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  @keyframes scan-fade {
    0%, 100% { opacity: 0; }
    20%, 80% { opacity: 0.6; }
  }
</style>
</head>
<body>
<div class="scene">
  <div class="badge">783</div>

  <!-- 轨道 -->
  <div class="orbit orbit-1"></div>
  <div class="orbit orbit-2"></div>
  <div class="orbit orbit-3"></div>

  <!-- 扫描 -->
  <div class="scan"></div>

  <!-- 节点 -->
  <div class="node node-cc" title="Claude Code">CC</div>
  <div class="node node-cx" title="Codex">CX</div>
  <div class="node node-cursor" title="Cursor">CS</div>
  <div class="node node-pi" title="Pi">Pi</div>

  <!-- 中心枢纽 -->
  <div class="hub">OMNI<br>GENT<br>meta</div>

  <!-- 底部信息 -->
  <div class="info">
    <div class="info-title">Omnigent · 元调度层</div>
    <div class="info-name">Omnigent 形象大使</div>
    <div class="info-desc">meta-harness：跑在 Claude Code、Codex、Cursor 之上的调度系统</div>
    <div class="tag-row">
      <span class="tag">多 Agent 协同</span>
      <span class="tag">跨设备接力</span>
      <span class="tag green">cross-review</span>
      <span class="tag green">YAML Agent</span>
    </div>
  </div>
</div>
</body>
</html>
